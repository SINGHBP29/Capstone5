# This file can be used to override default Diffy settings if needed.
# For this setup, the environment variables in docker-compose.yml are sufficient.
# This file is retained for future customization.
# This is a minimal, valid diffy.properties file.
# It provides the required configuration to prevent the "Malformed resource mapping" error.

# This setting is required, but not used in our current setup.
# It tells Diffy where to find the primary and candidate instances to compare.
# Since we are sending raw requests via the API, these values are placeholders.
diffy.master.primary=localhost:9990
diffy.master.secondary=localhost:9991
diffy.master.candidate=localhost:9992
